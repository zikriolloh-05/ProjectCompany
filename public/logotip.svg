<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glass">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feMerge>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <linearGradient id="glassGradient" x1="0" y1="0" x2="200" y2="200">
            <stop offset="0%" stop-color="rgba(59,130,246,0.2)"/>
            <stop offset="100%" stop-color="rgba(37,99,235,0.1)"/>
        </linearGradient>
    </defs>
    
    <!-- Фон с размытием -->
    <rect width="200" height="200" fill="url(#bgGradient)"/>
    <rect width="200" height="200" fill="rgba(15,23,42,0.8)"/>
    
    <!-- Стеклянный щит -->
    <path d="M100 28 L155 55 L155 96 C155 129 133 158 100 174 C67 158 45 129 45 96 L45 55 L100 28Z" 
          fill="url(#glassGradient)" 
          stroke="rgba(255,255,255,0.3)" 
          stroke-width="2"
          style="backdrop-filter: blur(5px)"/>
    
    <!-- Светящаяся молния -->
    <polygon points="90,70 110,70 103,83 117,83 87,113 100,98 93,83 90,70" 
             fill="#F59E0B"
             opacity="0.9"/>
    
    <!-- IT текст крупно -->
    <text x="100" y="178" 
          text-anchor="middle" 
          font-family="'Poppins', 'Segoe UI', 'Arial', sans-serif" 
          font-size="26" 
          font-weight="800" 
          fill="white"
          letter-spacing="2">
        IT
    </text>
    
    <!-- SUPPORT текст мелко и прозрачно -->
    <text x="100" y="198" 
          text-anchor="middle" 
          font-family="'Poppins', 'Segoe UI', 'Arial', sans-serif" 
          font-size="10" 
          font-weight="400" 
          fill="rgba(255,255,255,0.6)"
          letter-spacing="2">
        SUPPORT
    </text>
</svg>